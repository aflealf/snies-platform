# =============================================================================
# SNIES Data Platform - Docker Compose
# =============================================================================
# Levanta toda la plataforma con:  docker compose up -d
# Apaga todo (conservando datos):  docker compose down
# Apaga y borra volúmenes:         docker compose down -v
# =============================================================================

# -------- Configuración compartida para los servicios de Airflow --------
x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
  image: snies-platform/airflow:2.9.3
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__CORE__DEFAULT_TIMEZONE: ${AIRFLOW_TIMEZONE:-America/Bogota}
    AIRFLOW__WEBSERVER__DEFAULT_UI_TIMEZONE: ${AIRFLOW_TIMEZONE:-America/Bogota}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "false"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_POSTGRES_USER}:${AIRFLOW_POSTGRES_PASSWORD}@airflow-postgres:5432/${AIRFLOW_POSTGRES_DB}
    # Conexión preconfigurada al DWH (accesible en los DAGs como 'snies_dwh')
    AIRFLOW_CONN_SNIES_DWH: postgresql://${DWH_POSTGRES_USER}:${DWH_POSTGRES_PASSWORD}@dwh-postgres:5432/${DWH_POSTGRES_DB}
    # dbt encuentra su proyecto y profiles aquí
    DBT_PROFILES_DIR: /opt/airflow/dbt
    # Variables para que los DAGs sepan cómo conectarse al DWH
    DWH_HOST: dwh-postgres
    DWH_PORT: 5432
    DWH_USER: ${DWH_POSTGRES_USER}
    DWH_PASSWORD: ${DWH_POSTGRES_PASSWORD}
    DWH_DB: ${DWH_POSTGRES_DB}
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./dbt:/opt/airflow/dbt
  user: "${AIRFLOW_UID:-50000}:0"
  networks:
    - snies-net
  depends_on: &airflow-common-depends-on
    airflow-postgres:
      condition: service_healthy
    dwh-postgres:
      condition: service_healthy

# =============================================================================
#                              S E R V I C I O S
# =============================================================================
services:

  # ---------------------------------------------------------------------------
  # 1. Data Warehouse (PostgreSQL para Bronze/Silver/Gold)
  # ---------------------------------------------------------------------------
  dwh-postgres:
    image: postgres:16-alpine
    container_name: snies_dwh
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DWH_POSTGRES_USER}
      POSTGRES_PASSWORD: ${DWH_POSTGRES_PASSWORD}
      POSTGRES_DB: ${DWH_POSTGRES_DB}
    volumes:
      - dwh_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      # Expuesto al host para que Tableau / DBeaver puedan conectarse
      - "${DWH_POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DWH_POSTGRES_USER} -d ${DWH_POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - snies-net

  # ---------------------------------------------------------------------------
  # 2. Postgres para la metadata de Airflow (separado del DWH por higiene)
  # ---------------------------------------------------------------------------
  airflow-postgres:
    image: postgres:16-alpine
    container_name: snies_airflow_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${AIRFLOW_POSTGRES_USER}
      POSTGRES_PASSWORD: ${AIRFLOW_POSTGRES_PASSWORD}
      POSTGRES_DB: ${AIRFLOW_POSTGRES_DB}
    volumes:
      - airflow_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AIRFLOW_POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - snies-net

  # ---------------------------------------------------------------------------
  # 3. Airflow: init (migra DB y crea usuario admin) — corre UNA sola vez
  # ---------------------------------------------------------------------------
  airflow-init:
    <<: *airflow-common
    container_name: snies_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate && \
        airflow users create \
          --username ${AIRFLOW_ADMIN_USER:-admin} \
          --password ${AIRFLOW_ADMIN_PASSWORD:-admin} \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email ${AIRFLOW_ADMIN_EMAIL:-admin@example.com} || true
    restart: "no"

  # ---------------------------------------------------------------------------
  # 4. Airflow scheduler (el corazón: lee DAGs y dispara tareas)
  # ---------------------------------------------------------------------------
  airflow-scheduler:
    <<: *airflow-common
    container_name: snies_airflow_scheduler
    command: scheduler
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # ---------------------------------------------------------------------------
  # 5. Airflow webserver (la UI en http://localhost:8080)
  # ---------------------------------------------------------------------------
  airflow-webserver:
    <<: *airflow-common
    container_name: snies_airflow_web
    command: webserver
    restart: unless-stopped
    ports:
      - "${AIRFLOW_WEBSERVER_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # ---------------------------------------------------------------------------
  # 6. Metabase (BI demo — opcional, se puede apagar con --profile)
  # ---------------------------------------------------------------------------
  metabase:
    image: metabase/metabase:v0.50.17
    container_name: snies_metabase
    restart: unless-stopped
    ports:
      - "${METABASE_PORT:-3000}:3000"
    environment:
      MB_DB_TYPE: h2
      # Para producción conviene apuntar Metabase a su propio Postgres.
      # Para el reto, H2 local es suficiente.
      JAVA_TIMEZONE: ${AIRFLOW_TIMEZONE:-America/Bogota}
    volumes:
      - metabase_data:/metabase-data
    depends_on:
      dwh-postgres:
        condition: service_healthy
    networks:
      - snies-net

# =============================================================================
#                       V O L Ú M E N E S   Y   R E D
# =============================================================================
volumes:
  dwh_data:
    name: snies_dwh_data
  airflow_db_data:
    name: snies_airflow_db_data
  metabase_data:
    name: snies_metabase_data

networks:
  snies-net:
    name: snies-net
    driver: bridge
